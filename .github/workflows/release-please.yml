# .github/workflows/release-please.yml
name: Release Please

on:
  push:
    branches:
      - main
      - integrated_streamer
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          # Python project (adjust if you are not Python: simple/node/go/etc.)
          release-type: python

          # Shows up in release artifacts/PR title; keep as your package/repo name
          package-name: rfmux

          # Keep your existing tag trigger (`v*`) working
          tag-prefix: v

          # Target branch for release PR + tagging
          target-branch: integrated_streamer  #main

          skip-github-release: true
