# Shipped pytest configuration for the QC suite ("rfmux qc"). When installed
# from a wheel, the repository's pyproject.toml isn't available - this file
# carries the settings the suite needs.
[pytest]
markers =
    qc_stage1: CRS QC tests that require no loopback cabling
    qc_stage2: CRS QC tests that require loopback cables

asyncio_default_fixture_loop_scope = session
